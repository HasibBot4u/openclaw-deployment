## STEP 3 — Deploy on Render

1. Go to **render.com** → tap **New +** → tap **Web Service**
2. Tap **"Connect a repository"**
3. It shows your GitHub repos → tap **`openclaw-deployment`**
4. Tap **Connect**
5. Fill in the settings:
   - **Name**: `my-openclaw`
   - **Branch**: `main`
   - **Build Command**: `npm install`
   - **Start Command**: `npm start`
   - **Instance Type**: **Free**
6. Scroll down to **Environment Variables** → tap **Add Environment Variable** for each:

   | Key | Value |
   |---|---|
   | `TELEGRAM_BOT_TOKEN` | Your bot token |
   | `GOOGLE_GENERATIVEAI_API_KEY` | Your Gemini key |
   | `OPENCLAW_GATEWAY_PASSWORD` | `MySecret2026!` |
   | `NODE_ENV` | `production` |

7. Tap **Create Web Service**
8. Render starts building — wait **5–10 minutes**
9. When done, your public URL appears at the top: `https://my-openclaw.onrender.com`
10. ✅ **Save this URL** — it's your permanent web UI address

